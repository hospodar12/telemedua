<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MindAR production template</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
  <!--
    Для промислової версії:
    1) створіть файл targets.mind із assets/target.jpg через MindAR Image Compiler;
    2) покладіть targets.mind поряд із цим файлом;
    3) відкрийте через HTTPS.
  -->
  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: true;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <video id="arVideo" src="https://www.youtube.com/watch?v=-QZqMT6W9ZQ" preload="auto" playsinline webkit-playsinline muted></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0" id="target">
      <a-plane position="0 0 0" height="1.333" width="1" material="src: #arVideo"></a-plane>
    </a-entity>
  </a-scene>

  <script>
    const target = document.querySelector("#target");
    const video = document.querySelector("#arVideo");
    target.addEventListener("targetFound", () => {
      // У production краще використовувати власний mp4, а не YouTube URL як video src.
      window.location.href = "https://www.youtube.com/watch?v=-QZqMT6W9ZQ";
    });
  </script>
</body>
</html>
